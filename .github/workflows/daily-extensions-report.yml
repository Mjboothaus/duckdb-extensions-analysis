name: Daily DuckDB Extensions Report

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6 AM UTC
    - cron: '0 7 * * 1'  # Weekly (Mon) at 7 AM UTC - with issues analysis
  workflow_dispatch:
    inputs:
      with_issues:
        description: "Include GitHub issues analysis (slower)"
        required: false
        type: boolean
        default: false
      with_compatibility:
        description: "Include DuckDB version compatibility testing (can be slow)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  analyse-and-render:
    runs-on: ubuntu-latest
    timeout-minutes: 60  # Allows optional compatibility testing to complete
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Setup Python and dependencies
        run: |
          echo "🐍 Setting up Python environment with caching..."
          echo "UV version: $(uv --version)"
          echo "Installing Python 3.12 for better wheel support..."
          uv python install 3.12
          echo "Using Python: $(uv python list)"
          echo "Starting dependency installation..."
          uv sync --python 3.12 --verbose
          echo "✅ Dependencies installed successfully"
          echo "Virtual environment info:"
          uv pip list | head -10
      - name: Restore analysis cache
        uses: actions/cache@v5
        with:
          path: |
            .cache
            data/extensions.duckdb
          key: analysis-cache-${{ runner.os }}-v1-${{ hashFiles('conf/**/*.toml', 'templates/**/*.j2', 'src/**/*.py') }}
          restore-keys: |
            analysis-cache-${{ runner.os }}-v1-
      - name: Generate extensions report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🚀 Starting DuckDB extensions analysis..."

          # Daily runs should be fast by default.
          # - Weekly scheduled run enables issues (see cron above).
          # - Manual runs can opt in via workflow_dispatch input.
          WITH_ISSUES_FLAG=""
          if [ "${{ github.event_name }}" = "schedule" ] && [ "${{ github.event.schedule }}" = "0 7 * * 1" ]; then
            echo "🗓️ Weekly scheduled run: including GitHub issues analysis"
            WITH_ISSUES_FLAG="--with-issues"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.with_issues }}" = "true" ]; then
            echo "🔎 Manual run: including GitHub issues analysis (with_issues=true)"
            WITH_ISSUES_FLAG="--with-issues"
          else
            echo "⚡ Skipping GitHub issues analysis"
          fi

          WITH_COMPATIBILITY_FLAG=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.with_compatibility }}" = "true" ]; then
            echo "🧪 Manual run: enabling compatibility testing (with_compatibility=true)"
            WITH_COMPATIBILITY_FLAG="--with-compatibility-testing"
          else
            echo "⚡ Skipping compatibility testing"
          fi

          # Keep compatibility runs reasonably bounded so CI finishes.
          # (The implementation is best-effort, so a smaller sample is still useful.)
          COMPAT_ARGS=""
          if [ -n "$WITH_COMPATIBILITY_FLAG" ]; then
            COMPAT_ARGS="--compat-max-runtime-seconds 600 --compat-max-extensions 10"
          fi

          uv run scripts/cli.py report generate \
            --format markdown --format csv --format excel \
            ${WITH_ISSUES_FLAG} \
            ${WITH_COMPATIBILITY_FLAG} \
            ${COMPAT_ARGS}

          echo "✅ Analysis complete. Generated files:"
          ls -la reports/
      - name: Import third-party labels (if present)
        run: |
          # Labels are committed as a CSV so CI can produce the same verified report.
          # This is intentionally a no-op if the file is not present.
          if [ -f labels/third_party_extension_labels.csv ]; then
            echo "🏷️  Importing third-party labels from labels/third_party_extension_labels.csv"
            uv run python scripts/label_extension_candidates.py import labels/third_party_extension_labels.csv
          else
            echo "🏷️  No labels/third_party_extension_labels.csv found; skipping label import"
          fi
      - name: Generate verified third-party report (unlinked)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🧪 Generating verified third-party extensions report (unlinked sub-page)..."
          uv run python scripts/render_verified_third_party_report.py \
            --source recent \
            --out reports/third_party_extensions_verified.md
          echo "✅ Third-party report generated: reports/third_party_extensions_verified.md"
      - name: Save analysis to DuckDB database
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🗄️  Saving latest analysis into DuckDB database..."
          uv run scripts/cli.py database save
          echo "✅ Database saved"
          if [ -f data/extensions.duckdb ]; then
            echo "Database size:"
            du -h data/extensions.duckdb || true
            size_bytes=$(wc -c < data/extensions.duckdb)
            threshold_bytes=$((100 * 1024 * 1024))
            if [ "$size_bytes" -gt "$threshold_bytes" ]; then
              echo "⚠️  WARNING: data/extensions.duckdb is larger than 100MB ($(du -h data/extensions.duckdb | cut -f1)). Consider pruning history or changing persistence strategy."
            fi
          fi
      - name: Update README with latest status
        run: ./scripts/update_readme.sh
      - name: Upload analysis artefacts
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v6
        with:
          name: daily-report-artefacts
          if-no-files-found: error
          retention-days: 7
          path: |
            reports/
            README.md
            data/extensions.duckdb

  publish:
    needs: analyse-and-render
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: main
      - name: Download analysis artefacts
        uses: actions/download-artifact@v7
        with:
          name: daily-report-artefacts
          path: artefacts
      - name: Copy artefacts into workspace
        run: |
          rsync -a artefacts/reports/ reports/
          cp artefacts/README.md README.md
          mkdir -p data
          cp artefacts/data/extensions.duckdb data/extensions.duckdb
      - name: Commit and push reports
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"

          git fetch origin main
          git pull --rebase origin main || true

          git add -- reports/ README.md
          git add -f data/extensions.duckdb

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            db_size=$(du -h data/extensions.duckdb 2>/dev/null | cut -f1)
            git commit -m "📊 Daily extensions analysis: $(date -I)

            - Updated extension analysis for $(date -u '+%Y-%m-%d')
            - Generated markdown, CSV, and Excel reports
            - Saved DuckDB database snapshot (${db_size:-unknown})"
            git push || git push --force-with-lease
          fi

  deploy-to-pages:
    needs: publish
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: main
      
      - name: Setup Pages
        uses: actions/configure-pages@v6

      # Great Docs requirements (Quarto + Python deps).
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Setup Python and dependencies (docs)
        run: |
          uv python install 3.12
          uv sync --python 3.12 --frozen --dev

      - name: Create Pages site
        run: |
          # Generate HTML for main report
          # Note: markdown is already a project dependency (see pyproject.toml).
          uv run python scripts/build_report_site.py

          # Generate HTML for the verified third-party report as an unlinked sub-page
          # Note: this is intentionally not linked from the main page.
          uv run python scripts/build_report_site.py \
            --input reports/third_party_extensions_verified.md \
            --out-dir _site/third-party \
            --out-file index.html

          # Generate HTML for compatibility testing results (only when present)
          if [ -f reports/compatibility_testing.md ]; then
            uv run python scripts/build_report_site.py \
              --input reports/compatibility_testing.md \
              --out-dir _site/compatibility \
              --out-file index.html
          fi

          # Build Great Docs site (served under /docs/ to avoid clashing with the report site)
          uv run great-docs build
          mkdir -p _site/docs
          rsync -a great-docs/_site/ _site/docs/

          # Great Docs expects llms files alongside skill.md.
          # Great Docs' own generation is not reliably present for this repo, so we provide curated copies.
          cp docs/llms.txt docs/llms-full.txt _site/docs/ 2>/dev/null || true
          
          # Copy CSV and Excel files for download
          cp reports/*.csv reports/*.xlsx _site/ 2>/dev/null || true
          
          # Also copy the original markdown for direct access
          cp reports/latest.md _site/report.md
          cp reports/third_party_extensions_verified.md _site/third-party/report.md 2>/dev/null || true
          cp reports/compatibility_testing.md _site/compatibility/report.md 2>/dev/null || true

          # Backward-compatible link for docs surfaces that used /docs/reports/latest.md.
          mkdir -p _site/docs/reports
          cp reports/latest.md _site/docs/reports/latest.md
          
          echo "✅ Pages site prepared with proper HTML rendering"
      
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: '_site'
      
      - name: Deploy to Pages
        uses: actions/deploy-pages@v5

  smoke-test-pages:
    needs: deploy-to-pages
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Smoke test live Pages URLs
        run: |
          set -o pipefail

          base_url="https://mjboothaus.github.io/duckdb-extensions-analysis"

          echo "Checking main report URL: ${base_url}/"
          curl -fsSL -o /dev/null "${base_url}/"

          echo "Checking third-party report URL: ${base_url}/third-party/"
          curl -fsSL -o /dev/null "${base_url}/third-party/"

          echo "Checking compatibility report URL (may not exist on all runs): ${base_url}/compatibility/"
          if curl -fsSL -o /dev/null "${base_url}/compatibility/"; then
            echo "Compatibility URL OK"
          else
            echo "Compatibility URL not available on this run (skipping)"
          fi

          echo "Checking Great Docs URL (may not exist until first publish): ${base_url}/docs/"
          if curl -fsSL -o /dev/null "${base_url}/docs/"; then
            echo "Great Docs URL OK"

            echo "Checking Great Docs llms.txt: ${base_url}/docs/llms.txt"
            curl -fsSL -o /dev/null "${base_url}/docs/llms.txt"

            echo "Checking Great Docs llms-full.txt: ${base_url}/docs/llms-full.txt"
            curl -fsSL -o /dev/null "${base_url}/docs/llms-full.txt"
          else
            echo "Great Docs URL not available on this run (skipping)"
          fi
