name: Daily DuckDB Extensions Report

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6 AM UTC
    - cron: '0 7 * * 1'  # Weekly (Mon) at 7 AM UTC - with issues analysis
  workflow_dispatch:
    inputs:
      with_issues:
        description: "Include GitHub issues analysis (slower)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  analyze-extensions:
    runs-on: ubuntu-latest
    timeout-minutes: 25  # Prevent workflows from hanging
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0  # Ensure full history for rebase
      
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      
      - name: Setup Python and dependencies
        run: |
          echo "🐍 Setting up Python environment with caching..."
          echo "UV version: $(uv --version)"
          echo "Installing Python 3.12 for better wheel support..."
          uv python install 3.12
          echo "Using Python: $(uv python list)"
          echo "Starting dependency installation..."
          uv sync --python 3.12 --verbose
          echo "✅ Dependencies installed successfully"
          echo "Virtual environment info:"
          uv pip list | head -10
      
      - name: Restore analysis cache
        uses: actions/cache@v4
        with:
          path: |
            .cache
            data/extensions.duckdb
          key: analysis-cache-${{ runner.os }}-v1-${{ hashFiles('conf/**/*.toml', 'templates/**/*.j2', 'src/**/*.py') }}
          restore-keys: |
            analysis-cache-${{ runner.os }}-v1-
      
      - name: Generate extensions report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🚀 Starting DuckDB extensions analysis..."

          # Daily runs should be fast by default.
          # - Weekly scheduled run enables issues (see cron above).
          # - Manual runs can opt in via workflow_dispatch input.
          WITH_ISSUES_FLAG=""
          if [ "${{ github.event_name }}" = "schedule" ] && [ "${{ github.event.schedule }}" = "0 7 * * 1" ]; then
            echo "🗓️ Weekly scheduled run: including GitHub issues analysis"
            WITH_ISSUES_FLAG="--with-issues"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.with_issues }}" = "true" ]; then
            echo "🔎 Manual run: including GitHub issues analysis (with_issues=true)"
            WITH_ISSUES_FLAG="--with-issues"
          else
            echo "⚡ Skipping GitHub issues analysis"
          fi

          uv run scripts/cli.py report generate \
            --format markdown --format csv --format excel \
            ${WITH_ISSUES_FLAG}

          echo "✅ Analysis complete. Generated files:"
          ls -la reports/

      - name: Import third-party labels (if present)
        run: |
          # Labels are committed as a CSV so CI can produce the same verified report.
          # This is intentionally a no-op if the file is not present.
          if [ -f labels/third_party_extension_labels.csv ]; then
            echo "🏷️  Importing third-party labels from labels/third_party_extension_labels.csv"
            uv run python scripts/label_extension_candidates.py import labels/third_party_extension_labels.csv
          else
            echo "🏷️  No labels/third_party_extension_labels.csv found; skipping label import"
          fi

      - name: Generate verified third-party report (unlinked)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🧪 Generating verified third-party extensions report (unlinked sub-page)..."
          uv run python scripts/render_verified_third_party_report.py \
            --source recent \
            --out reports/third_party_extensions_verified.md
          echo "✅ Third-party report generated: reports/third_party_extensions_verified.md"

      - name: Save analysis to DuckDB database
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🗄️  Saving latest analysis into DuckDB database..."
          uv run scripts/cli.py database save
          echo "✅ Database saved"
          if [ -f data/extensions.duckdb ]; then
            echo "Database size:"
            du -h data/extensions.duckdb || true
            # Warn if DB grows beyond a reasonable threshold.
            size_bytes=$(wc -c < data/extensions.duckdb)
            threshold_bytes=$((100 * 1024 * 1024))
            if [ "$size_bytes" -gt "$threshold_bytes" ]; then
              echo "⚠️  WARNING: data/extensions.duckdb is larger than 100MB ($(du -h data/extensions.duckdb | cut -f1)). Consider pruning history or changing persistence strategy."
            fi
          fi
      
      - name: Update README with latest status
        run: ./scripts/update_readme.sh
      
      - name: Commit and push reports
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          
          # Ensure we are up-to-date with remote before committing
          git fetch origin main
          # Rebase local changes on top of remote to avoid non-fast-forward errors
          git pull --rebase origin main || true
          
          # Add report files, README, and database (commit only if changed)
          # Note: data/ is gitignored in the repo, so force-add the DB file.
          git add -- reports/ README.md
          # Include the third-party report markdown (unlinked on the site, but still part of artefacts)
          git add -- reports/third_party_extensions_verified.md
          git add -f data/extensions.duckdb
          
          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            db_size=$(du -h data/extensions.duckdb 2>/dev/null | cut -f1)
            git commit -m "📊 Daily extensions analysis: $(date -I)
            
            - Updated extension analysis for $(date -u '+%Y-%m-%d')
            - Generated markdown, CSV, and Excel reports
            - Saved DuckDB database snapshot (${db_size:-unknown})
            - Includes GitHub issues analysis for extension health monitoring"
            # Try normal push first, then fallback with --force-with-lease if needed
            git push || git push --force-with-lease
          fi

  deploy-to-pages:
    needs: analyze-extensions
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: main  # Ensure we get the updated reports
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Create Pages site
        run: |
          # Install markdown converter
          pip install markdown
          
          # Generate HTML for main report
          python scripts/build_report_site.py

          # Generate HTML for the verified third-party report as an unlinked sub-page
          # Note: this is intentionally not linked from the main page.
          python scripts/build_report_site.py \
            --input reports/third_party_extensions_verified.md \
            --out-dir _site/third-party \
            --out-file index.html
          
          # Copy CSV and Excel files for download
          cp reports/*.csv reports/*.xlsx _site/ 2>/dev/null || true
          
          # Also copy the original markdown for direct access
          cp reports/latest.md _site/report.md
          cp reports/third_party_extensions_verified.md _site/third-party/report.md 2>/dev/null || true
          
          echo "✅ Pages site prepared with proper HTML rendering"
      
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'
      
      - name: Deploy to Pages
        uses: actions/deploy-pages@v4