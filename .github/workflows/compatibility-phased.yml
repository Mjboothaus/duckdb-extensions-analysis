name: Compatibility testing (phased)

on:
  workflow_dispatch:
    inputs:
      duckdb_version:
        description: "DuckDB version(s) to test (repeatable not supported in workflow_dispatch; comma-separated)"
        required: false
        type: string
        default: ""
      min_version:
        description: "Minimum DuckDB version (used when duckdb_version is empty)"
        required: false
        type: string
        default: "1.3.0"
      max_runtime_seconds:
        description: "Maximum runtime for compatibility testing"
        required: false
        type: number
        default: 900
      max_extensions:
        description: "Maximum number of community extensions to test"
        required: false
        type: number
        default: 25
      per_test_timeout_seconds:
        description: "Timeout per extension test"
        required: false
        type: number
        default: 120

permissions:
  contents: read

jobs:
  run-compatibility:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Setup Python and dependencies
        run: |
          uv python install 3.12
          uv sync --python 3.12 --verbose
      - name: Restore analysis cache
        uses: actions/cache@v5
        with:
          path: |
            .cache
          key: compat-cache-${{ runner.os }}-v1-${{ hashFiles('conf/**/*.toml', 'templates/**/*.j2', 'src/**/*.py') }}
          restore-keys: |
            compat-cache-${{ runner.os }}-v1-
      - name: Run report generation with compatibility testing
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -o pipefail

          DUCKDB_VERSIONS_RAW="${{ inputs.duckdb_version }}"

          DUCKDB_VERSION_FLAGS=""
          if [ -n "$DUCKDB_VERSIONS_RAW" ]; then
            IFS=',' read -ra versions <<< "$DUCKDB_VERSIONS_RAW"
            for v in "${versions[@]}"; do
              trimmed=$(echo "$v" | xargs)
              if [ -n "$trimmed" ]; then
                DUCKDB_VERSION_FLAGS="$DUCKDB_VERSION_FLAGS --compat-duckdb-version $trimmed"
              fi
            done
          fi

          uv run scripts/cli.py report generate \
            --format markdown \
            --with-compatibility-testing \
            --compat-min-version "${{ inputs.min_version }}" \
            --compat-max-runtime-seconds "${{ inputs.max_runtime_seconds }}" \
            --compat-max-extensions "${{ inputs.max_extensions }}" \
            --compat-per-test-timeout-seconds "${{ inputs.per_test_timeout_seconds }}" \
            $DUCKDB_VERSION_FLAGS
      - name: Upload compatibility artefacts
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v6
        with:
          name: compatibility-report
          if-no-files-found: error
          retention-days: 14
          path: |
            reports/latest.md
            reports/duckdb_extensions_report_*.md
